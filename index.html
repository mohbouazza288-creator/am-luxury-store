<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>AM Luxury</title>
    <style>
        :root {
            --main-bg: #0A2626;
            --accent-creme: #F5E6CC;
            --gold: #D4B483;
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--main-bg); 
            color: var(--white); 
            text-align: center; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* 1. شريط الإعلانات العلوي */
        .announcement-bar {
            background: var(--gold);
            color: var(--main-bg);
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
        }

        /* الهيدر */
        .header-section { 
            background: var(--accent-creme); 
            color: var(--main-bg); 
            padding: 15px; 
            border-bottom: 3px solid var(--gold); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .store-logo { width: 70px; height: 70px; object-fit: cover; border-radius: 50%; border: 2px solid var(--gold); }
        .store-name { font-size: 1.5em; margin: 5px 0; font-weight: bold; }

        /* زر الإدارة وزر السلة */
        .header-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--main-bg);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .admin-btn { left: 15px; }
        .cart-toggle-btn { right: 15px; font-weight: bold; }

        /* واجهة المنتجات - تكبير كامل (الزوم) */
        #product-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            gap: 25px;
        }

        .product-card { 
            background: var(--accent-creme); 
            color: var(--main-bg); 
            padding: 15px; 
            border-radius: 15px; 
            width: 95%; /* تكبير الواجهة */
            max-width: 500px;
            border: 2px solid var(--gold);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .product-card h3 { font-size: 1.3em; margin: 12px 0; }

        .img-container { 
            position: relative; 
            width: 100%; 
            height: 400px; /* زوم كبير للصورة */
            overflow: hidden; 
            border-radius: 10px; 
            background: #fff;
        }
        .product-img { width: 100%; height: 100%; object-fit: cover; }

        /* الصفحات المنبثقة (السلة والإدارة) */
        .full-page-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--main-bg);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .close-page-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            font-weight: bold;
        }

        /* تنسيقات الجداول والقوائم داخل الصفحات */
        .admin-table { width: 100%; border-collapse: collapse; background: var(--accent-creme); color: var(--main-bg); }
        .admin-table th, .admin-table td { border: 1px solid var(--gold); padding: 10px; text-align: center; }

        .cart-page-content { background: var(--accent-creme); color: var(--main-bg); padding: 20px; border-radius: 15px; text-align: right; }
        
        /* أزرار وعناصر التحكم */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 50%; }
        .btn-size { margin: 5px; border: 1px solid var(--main-bg); padding: 8px 15px; cursor: pointer; border-radius: 6px; background: #fff; font-weight: bold; }
        .btn-size.active { background: var(--main-bg); color: var(--gold); border-color: var(--gold); }
        .add-btn { background: var(--main-bg); color: var(--gold); border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; }
        
        #custom-alert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-creme); color: var(--main-bg); padding: 20px; border-radius: 12px; border: 2px solid var(--gold); z-index: 20000; width: 80%; text-align: center; font-weight: bold; }
        .cart-item { display: flex; justify-content: space-between; background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <marquee direction="right">✨ توصيل سريع لـ 58 ولاية - استمتع بأفضل المنتجات مع AM Luxury ✨</marquee>
    </div>

    <div class="header-section">
        <button class="header-btn admin-btn" onclick="togglePage('admin-page', true)">📦 السجلات</button>
        <img src="https://iafevewyaewiujdxipil.supabase.co/storage/v1/object/public/assets/bzam.png" class="store-logo">
        <h1 class="store-name">AM Luxury</h1>
        <button class="header-btn cart-toggle-btn" onclick="togglePage('cart-page', true)">🛒 السلة (<span id="cart-count">0</span>)</button>
    </div>

    <div id="cart-page" class="full-page-overlay">
        <button class="close-page-btn" onclick="togglePage('cart-page', false)">🔙 العودة للمتجر</button>
        <div class="cart-page-content">
            <h2 style="text-align: center;">🛒 سلة المشتريات</h2>
            <div id="cart-items"></div>
            <div id="cart-total" style="margin: 20px 0; font-weight:bold; border-top: 2px solid var(--main-bg); padding-top:15px; font-size: 1.2em;"></div>
            
            <hr>
            <h3>📍 معلومات التوصيل</h3>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف (05/06/07)" maxlength="10">
            <select id="cust-wilaya" onchange="renderCart()"><option value="">اختر الولاية...</option></select>
            <select id="cust-delivery" onchange="renderCart(); document.getElementById('address-box').style.display=(this.value=='توصيل للمنزل'?'block':'none')">
                <option value="استلام من المكتب">📦 استلام من المكتب (Yalidine/Noest)</option>
                <option value="توصيل للمنزل">🏠 توصيل للمنزل</option>
            </select>
            <input type="text" id="address-box" placeholder="العنوان بالتفصيل" style="display:none;">
            
            <button onclick="sendOrder()" class="add-btn" style="background:#25D366; color:white;">تأكيد الطلب عبر تلغرام ✨</button>
        </div>
    </div>

    <div id="admin-page" class="full-page-overlay">
        <button class="close-page-btn" onclick="togglePage('admin-page', false)">إغلاق السجلات</button>
        <h2 style="color:var(--gold);">📋 سجل الطلبات المسبقة</h2>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>الطلبية</th>
                    <th>الحالة</th>
                    <th>التاريخ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="3">لا توجد سجلات حالياً</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="product-container">جاري التحميل...</div>

    <div id="custom-alert">
        <p>✨ AM Luxury</p>
        <p>تم إرسال طلبك بنجاح! سنتصل بك قريباً.</p>
    </div>

    <footer style="padding: 20px; font-size: 12px; opacity: 0.8;">
        <p>© 2026 AM Luxury - All Rights Reserved</p>
    </footer>

    <script>
        const API_SHEETY = "https://api.sheety.co/f07bc4c4911bc49dacebf60eaa258f01/feuilleDeCalculSansTitre/feuille1";
        const BOT_TOKEN = "8753134519:AAEaqgsaa8kZat3v1pYyNqlfMnZ1JUU0tDM";
        const CHAT_ID = "8332065634";
        
        let cart = [], selectedSizes = {}, productImages = {};
        
        const rates = { "01 أدرار": [1500, 1000], "02 الشلف": [750, 450], "03 الأغواط": [1000, 600], "04 أم البواقي": [900, 600], "05 باتنة": [900, 600], "06 بجاية": [800, 500], "07 بسكرة": [1100, 700], "08 بشار": [1200, 800], "09 البليدة": [750, 450], "10 البويرة": [800, 500], "11 تمنراست": [2000, 1500], "12 تبسة": [900, 600], "13 تلمسان": [800, 500], "14 تيارت": [800, 500], "15 تيزي وزو": [800, 500], "16 الجزائر": [700, 450], "17 الجلفة": [1000, 600], "18 جيجل": [900, 600], "19 سطيف": [900, 600], "20 سعيدة": [500, 300], "21 سكيكدة": [900, 600], "22 سيدي بلعباس": [650, 400], "23 عنابة": [900, 600], "24 قالمة": [900, 600], "25 قسنطينة": [900, 600], "26 المدية": [900, 600], "27 مستغانم": [800, 500], "28 المسيلة": [900, 600], "29 معسكر": [600, 400], "30 ورقلة": [1000, 600], "31 وهران": [700, 450], "32 البيض": [1200, 800], "33 إليزي": [1900, 1500], "34 برج بوعريريج": [900, 600], "35 بومرداس": [750, 450], "36 الطارف": [900, 600], "37 تندوف": [1700, 1000], "38 تيسمسيلت": [900, 600], "39 الوادي": [1000, 600], "40 خنشلة": [900, 600], "41 سوق أهراس": [900, 600], "42 تيبازة": [750, 450], "43 ميلة": [900, 600], "44 عين الدفلى": [800, 500], "45 النعامة": [1200, 800], "46 عين تموشنت": [800, 500], "47 غرداية": [1000, 600], "48 غليزان": [700, 450], "49 أولاد جلال": [1100, 700], "50 بني عباس": [1200, 800], "51 إن صالح": [1800, 1200], "52 إن قزام": [2200, 1800], "53 تقرت": [1000, 600], "54 جانت": [2200, 1800], "55 المغير": [1000, 600], "56 المنيعة": [1000, 600], "58 برج باجي مختار": [2000, 1500] };

        function togglePage(id, show) {
            document.getElementById(id).style.display = show ? 'block' : 'none';
        }

        const wSelect = document.getElementById("cust-wilaya");
        Object.keys(rates).forEach(w => { let o = document.createElement("option"); o.value = w; o.innerHTML = w; wSelect.appendChild(o); });

        fetch(API_SHEETY).then(r => r.json()).then(data => {
            const container = document.getElementById("product-container");
            container.innerHTML = "";
            (data.feuille1 || []).forEach((p, i) => {
                productImages[i] = [p.image1, p.image2, p.image3, p.image4].filter(img => img && img.trim() !== "");
                const available = (p.sizes || "S,M,L,XL").split(',').map(s => s.trim());
                selectedSizes[i] = available[0];
                
                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container" id="img-box-${i}">
                            <img src="${productImages[i][0] || ''}" class="product-img">
                            ${productImages[i].length > 1 ? `<button class="nav-btn" style="left:5px" onclick="changeImg(${i}, -1)">❮</button><button class="nav-btn" style="right:5px" onclick="changeImg(${i}, 1)">❯</button>` : ''}
                        </div>
                        <h3>${p.name}</h3>
                        <p style="font-weight:bold; font-size:1.4em; color:var(--main-bg); margin:10px 0;">${p.price} دج</p>
                        <div id="size-btns-${i}">
                            ${['S','M','L','XL','XXL'].map(s => available.includes(s) ? `<button class="btn-size ${s==selectedSizes[i] ? 'active':''}" onclick="selectSize(${i}, '${s}')">${s}</button>` : '').join('')}
                        </div>
                        <button class="add-btn" onclick="addToCart('${p.name}', ${p.price}, ${i})">إضافة للسلة 🛒</button>
                    </div>`;
            });
        });

        function changeImg(idx, dir) {
            const img = document.getElementById(`img-box-${idx}`).querySelector('img');
            let imgs = productImages[idx];
            let next = (imgs.indexOf(img.src) + dir + imgs.length) % imgs.length;
            img.src = imgs[next];
        }

        function selectSize(i, s) { selectedSizes[i] = s; document.getElementById(`size-btns-${i}`).querySelectorAll('.btn-size').forEach(b => b.classList.toggle('active', b.innerText === s)); }
        
        function addToCart(name, price, i) { 
            cart.push({name, price, size: selectedSizes[i]}); 
            document.getElementById('cart-count').innerText = cart.length;
            renderCart(); 
            const btn = event.target; btn.innerText = "تمت الإضافة 👍"; 
            setTimeout(()=> btn.innerText="إضافة للسلة 🛒", 1000);
        }

        function renderCart() {
            const w = document.getElementById("cust-wilaya").value;
            const d = document.getElementById("cust-delivery").value;
            let sub = cart.reduce((s, i) => s + parseInt(i.price), 0);
            let ship = (w && rates[w]) ? (d == 'توصيل للمنزل' ? rates[w][0] : rates[w][1]) : 0;
            
            document.getElementById("cart-items").innerHTML = cart.map((i, idx) => `
                <div class="cart-item">
                    <span><b>${i.name}</b> (${i.size})</span>
                    <span style="color:red; cursor:pointer; font-weight:bold;" onclick="cart.splice(${idx},1); document.getElementById('cart-count').innerText = cart.length; renderCart()">حذف ✖</span>
                </div>`).join('');
            
            document.getElementById("cart-total").innerHTML = cart.length ? `
                <div style="display:flex; justify-content:space-between;"><span>قيمة السلعة:</span> <span>${sub} دج</span></div>
                <div style="display:flex; justify-content:space-between;"><span>التوصيل:</span> <span>${ship} دج</span></div>
                <div style="display:flex; justify-content:space-between; font-size:1.2em; margin-top:10px; color:var(--main-bg); font-weight:bold;"><span>المجموع النهائي:</span> <span>${sub + ship} دج</span></div>
            ` : 'السلة فارغة حالياً..';
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const wilaya = document.getElementById('cust-wilaya').value;
            const delivery = document.getElementById('cust-delivery').value;
            if (!name || phone.length < 10 || !wilaya || cart.length === 0) { alert("أكمل البيانات من فضلك!"); return; }
            
            let msg = `🌟 *طلب جديد من AM Luxury*%0A%0A👤 *الزبون:* ${name}%0A📱 *الهاتف:* ${phone}%0A📍 *الولاية:* ${wilaya}%0A🚚 *النوع:* ${delivery}%0A`;
            if(document.getElementById('address-box').value) msg += `🏠 *العنوان:* ${document.getElementById('address-box').value}%0A`;
            
            msg += `%0A📦 *الطلبية:*%0A` + cart.map(i => `- ${i.name} (${i.size})`).join('%0A');
            let total = cart.reduce((s, i) => s + parseInt(i.price), 0) + (rates[wilaya][delivery == 'توصيل للمنزل' ? 0 : 1]);
            msg += `%0A%0A💰 *المجموع النهائي:* ${total} دج`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`)
            .then(() => {
                document.getElementById('custom-alert').style.display = 'block';
                setTimeout(() => { location.reload(); }, 3000);
            });
        }
    </script>
</body>
</html>
