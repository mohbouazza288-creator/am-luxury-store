<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AM Luxury</title>
    <style>
        body { font-family: sans-serif; background-color: #0A2626; color: #fff; text-align: center; padding: 20px; }
        .header-section { background: #F5E6CC; color: #0A2626; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #D4B483; }
        .store-logo { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 3px solid #D4B483; margin-bottom: 10px; }
        .store-name { font-size: 2.5em; font-weight: bold; margin: 10px 0 5px 0; color: #0A2626; }
        .slogan { font-size: 1.2em; font-style: italic; color: #555; margin-bottom: 20px; }
        .product-card { background: #F5E6CC; color: #0A2626; padding: 15px; border-radius: 15px; margin: 15px auto; max-width: 300px; border: 2px solid #D4B483; }
        .slider-container { position: relative; width: 100%; margin-bottom: 10px; }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; border: 2px solid #D4B483; }
        .nav-btn { background: #0A2626; color: #D4B483; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .cart-section { background: #F5E6CC; color: #0A2626; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: right; }
        input, select { width: 90%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #D4B483; }
        .add-btn { background: #D4B483; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .btn-size { margin: 3px; border: 1px solid #D4B483; padding: 5px 10px; cursor: pointer; border-radius: 5px; background: #fff; }
        .btn-size.active { background: #0A2626; color: #D4B483; }
        .footer-social { margin-top: 40px; padding: 20px; border-top: 1px solid #D4B483; color: #D4B483; }
        .footer-social a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://iafevewyaewiujdxipil.supabase.co/storage/v1/object/public/assets/bzam.png" alt="AM Luxury Logo" class="store-logo">
        <h1 class="store-name">AM Luxury</h1>
        <p class="slogan">Classic and Casual for Your Style</p>
    </div>

    <div id="product-container"></div>

    <section class="cart-section">
        <h2 style="text-align: center;">🛒 سلة التسوق</h2>
        <div id="cart-items"></div>
        <hr>
        <input type="text" id="cust-name" placeholder="الاسم الكامل" required>
        <input type="tel" id="cust-phone" placeholder="رقم الهاتف (10 أرقام)" pattern="0[5-7][0-9]{8}" maxlength="10" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <select id="cust-wilaya" onchange="renderCart()"><option value="">اختر الولاية...</option></select>
        <select id="cust-delivery" onchange="renderCart(); document.getElementById('address-box').style.display=(this.value=='توصيل للمنزل'?'block':'none')">
            <option value="استلام من المكتب">استلام من المكتب</option>
            <option value="توصيل للمنزل">توصيل للمنزل</option>
        </select>
        <input type="text" id="address-box" placeholder="العنوان بالتفصيل" style="display:none;">
        <button onclick="sendOrder()" class="add-btn" style="background:#0A2626; color:#D4B483;">إتمام الطلب</button>
    </section>

    <script>
        const API_SHEETY = "https://api.sheety.co/52fd183a674270cd4b36a72f4307bb93/feuilleDeCalculSansTitre/feuille1";
        const BOT_TOKEN = "8753134519:AAEaqgsaa8kZat3v1pYyNqlfMnZ1JUU0tDM";
        const CHAT_ID = "8332065634";
        let cart = [];
        // متغير لحفظ المقاس المختار لكل منتج مؤقتاً
        let selectedSizes = {}; 

        const rates = { "01 أدرار": [1500, 1000], "02 الشلف": [750, 450], "16 الجزائر": [700, 450], "31 وهران": [700, 450] /* ... أضف البقية ... */ };
        
        // جلب البيانات
        fetch(API_SHEETY).then(r => r.json()).then(data => {
            const container = document.getElementById("product-container");
            const allSizes = ['S', 'M', 'L', 'XL', 'XXL'];
            data.feuille1.forEach((p, i) => {
                const imgs = [p.image1, p.image2, p.image3, p.image4, p.image5].filter(img => img);
                const available = p.sizes ? p.sizes.split(',').map(s => s.trim()) : allSizes;
                // تعيين مقاس افتراضي
                selectedSizes[i] = available[0];
                
                container.innerHTML += `<div class="product-card"><h3>${p.name}</h3>
                    <div class="slider-container">
                        <img id="img-${i}" src="${imgs[0]}" data-imgs='${JSON.stringify(imgs)}' data-curr="0" class="product-img">
                        <div>
                            <button class="nav-btn" onclick="changeImg(${i}, -1)">❮</button>
                            <button class="nav-btn" onclick="changeImg(${i}, 1)">❯</button>
                        </div>
                    </div>
                    <p>السعر: ${p.price} دج</p>
                    <div id="size-btns-${i}">
                        ${allSizes.map(s => available.includes(s) ? 
                            `<button class="btn-size ${s === selectedSizes[i] ? 'active' : ''}" onclick="selectSize(${i}, '${s}')">${s}</button>` : 
                            `<button class="btn-size" disabled style="text-decoration:line-through; opacity:0.3;">${s}</button>`).join('')}
                    </div>
                    <button class="add-btn" onclick="addToCart('${p.name}', ${p.price}, ${i})">إضافة للسلة</button></div>`;
            });
        });

        function selectSize(prodIndex, size) {
            selectedSizes[prodIndex] = size;
            const container = document.getElementById(`size-btns-${prodIndex}`);
            const buttons = container.querySelectorAll('.btn-size');
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.innerText === size);
            });
        }

        function addToCart(name, price, prodIndex) {
            cart.push({name, price, size: selectedSizes[prodIndex]});
            renderCart();
            showNotification("تمت الإضافة للسلة!");
        }

        function changeImg(i, dir) {
            const img = document.getElementById(`img-${i}`);
            const list = JSON.parse(img.dataset.imgs);
            let cur = (parseInt(img.dataset.curr) + dir + list.length) % list.length;
            img.src = list[cur]; img.dataset.curr = cur;
        }

        // ... بقية الدوال (renderCart, sendOrder, showNotification) تبقى كما هي ...
    </script>
</body>
</html>
