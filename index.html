<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AM Luxury</title>
    <style>
        :root { --main-bg: #0A2626; --accent: #F5E6CC; --gold: #D4B483; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--main-bg); color: #fff; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        
        .announcement-bar { background: var(--gold); color: var(--main-bg); padding: 10px 0; font-size: 0.9em; font-weight: bold; position: sticky; top: 0; z-index: 10002; overflow: hidden; }
        .announcement-text { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .header-section { background: var(--accent); color: var(--main-bg); padding: 40px 20px; border-bottom: 2px solid var(--gold); }
        .store-logo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; }

        .page { display: none; padding: 20px; min-height: 60vh; }
        .page.active { display: block; }

        .product-card { background: var(--accent); color: var(--main-bg); padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 400px; border: 2px solid var(--gold); text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .img-container { position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 10px; border: 1px solid var(--gold); background: #fff; }
        .product-img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; transition: transform 0.3s; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 10; }

        .size-container { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .size-btn { border: 1px solid var(--main-bg); padding: 8px 15px; border-radius: 5px; background: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .size-btn.active { background: var(--main-bg); color: var(--gold); }

        .cart-section { background: var(--accent); color: var(--main-bg); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 450px; text-align: right; border: 2px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .confirm-btn { background: #25D366; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1em; margin-top: 10px; }

        #floating-cart { position: fixed; bottom: 20px; left: 20px; background: var(--gold); color: var(--main-bg); border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; display: none; }
        #custom-alert { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--main-bg); padding: 25px; border-radius: 15px; border: 3px solid var(--gold); z-index: 10005; width: 80%; max-width: 300px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="announcement-bar"><div class="announcement-text">🚛 توصيل سريع لـ 58 ولاية | 🤝 الدفع عند الاستلام | ✨ AM Luxury</div></div>

    <div id="shop-page" class="page active">
        <div class="header-section">
            <img src="https://iafevewyaewiujdxipil.supabase.co/storage/v1/object/public/assets/bzam.png" class="store-logo">
            <h1>AM Luxury</h1>
            <p>الفخامة الجزائرية الأصلية</p>
        </div>
        <div id="product-container">جاري تحميل المنتجات...</div>
        <button id="floating-cart" onclick="showPage('cart-page')">🛒 السلة (<span id="cart-count">0</span>)</button>
    </div>

    <div id="cart-page" class="page">
        <button onclick="showPage('shop-page')" style="float:right; border:none; background:none; color:var(--gold); font-size:1.2em; cursor:pointer; font-weight:bold;">➡️ العودة للتسوق</button>
        <h2 style="margin-top:60px; color:var(--gold);">📋 تأكيد الطلبية</h2>
        <section class="cart-section">
            <div id="cart-items-summary" style="background:#fff; padding:15px; border-radius:8px; margin-bottom:15px; color:#333; border:1px solid #ddd;"></div>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف (10 أرقام)" maxlength="10">
            <select id="cust-wilaya" onchange="updateTotal()"><option value="">اختر الولاية...</option></select>
            <select id="cust-delivery" onchange="toggleAddress()">
                <option value="استلام من المكتب">استلام من المكتب (Noest Express)</option>
                <option value="توصيل للمنزل">توصيل للمنزل</option>
            </select>
            <input type="text" id="address-box" placeholder="العنوان بالتفصيل" style="display:none;">
            <div id="final-price" style="margin:20px 0; font-weight:bold; font-size:1.3em; border-top:1px solid #ccc; padding-top:10px;"></div>
            <button onclick="sendOrder()" class="confirm-btn">إرسال الطلب عبر Telegram 🚀</button>
        </section>
    </div>

    <div id="custom-alert"><p id="alert-msg"></p></div>

    <script>
        const BOT_TOKEN = "8753134519:AAEaqgsaa8kZat3v1pYyNqlfMnZ1JUU0tDM";
        const CHAT_ID = "8332065634";
        const API_SHEETY = "https://api.sheety.co/f07bc4c4911bc49dacebf60eaa258f01/feuilleDeCalculSansTitre/feuille1";

        const rates = { 
            "01 أدرار": [1500, 1000], "02 الشلف": [750, 450], "03 الأغواط": [1000, 600], "04 أم البواقي": [900, 600], "05 باتنة": [900, 600], "06 بجاية": [800, 500], "07 بسكرة": [1100, 700], "08 بشار": [1200, 800], "09 البليدة": [750, 450], "10 البويرة": [800, 500], "11 تمنراست": [2000, 1500], "12 تبسة": [900, 600], "13 تلمسان": [800, 500], "14 تيارت": [800, 500], "15 تيزي وزو": [800, 500], "16 الجزائر": [700, 450], "17 الجلفة": [1000, 600], "18 جيجل": [900, 600], "19 سطيف": [900, 600], "20 سعيدة": [500, 300], "21 سكيكدة": [900, 600], "22 سيدي بلعباس": [650, 400], "23 عنابة": [900, 600], "24 قالمة": [900, 600], "25 قسنطينة": [900, 600], "26 المدية": [900, 600], "27 مستغانم": [800, 500], "28 المسيلة": [900, 600], "29 معسكر": [600, 400], "30 ورقلة": [1000, 600], "31 وهران": [700, 450], "32 البيض": [1200, 800], "33 إليزي": [1900, 1500], "34 برج بوعريريج": [900, 600], "35 bومرداس": [750, 450], "36 الطارف": [900, 600], "37 تندوف": [1700, 1000], "38 تيسمسيلت": [900, 600], "39 الوادي": [1000, 600], "40 خنشلة": [900, 600], "41 سوق أهراس": [900, 600], "42 تيبازة": [750, 450], "43 ميلة": [900, 600], "44 عين الدفلى": [800, 500], "45 النعامة": [1200, 800], "46 عين تموشنت": [800, 500], "47 غرداية": [1000, 600], "48 غليزان": [700, 450], "49 أولاد جلال": [1100, 700], "50 بني عباس": [1200, 800], "51 إن صالح": [1800, 1200], "52 إن قزام": [2200, 1800], "53 تقرت": [1000, 600], "54 جانت": [2200, 1800], "55 المغير": [1000, 600], "56 المنيعة": [1000, 600], "58 برج باجي مختار": [2000, 1500]
        };

        const wSelect = document.getElementById("cust-wilaya");
        Object.keys(rates).forEach(w => { let o = document.createElement("option"); o.value = w; o.innerHTML = w; wSelect.appendChild(o); });

        let cart = [], productImages = {}, selectedSizes = {};

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'cart-page') renderCartSummary();
            window.scrollTo(0,0);
        }

        function toggleAddress() {
            document.getElementById('address-box').style.display = (document.getElementById('cust-delivery').value === 'توصيل للمنزل') ? 'block' : 'none';
            updateTotal();
        }

        function showAlert(msg) {
            const b = document.getElementById('custom-alert');
            document.getElementById('alert-msg').innerText = msg;
            b.style.display = 'block'; setTimeout(() => b.style.display = 'none', 3000);
        }

        fetch(API_SHEETY).then(r => r.json()).then(data => {
            const container = document.getElementById("product-container");
            container.innerHTML = "";
            (data.feuille1 || []).forEach((p, i) => {
                productImages[i] = [p.image1, p.image2, p.image3, p.image4].filter(img => img && img.trim() !== "");
                const szs = (p.sizes || "S,M,L,XL").split(',').map(s => s.trim());
                selectedSizes[i] = szs[0];
                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container" id="img-box-${i}">
                            <img src="${productImages[i][0]}" class="product-img">
                            ${productImages[i].length > 1 ? `
                                <button class="nav-btn" style="right:5px;" onclick="changeImg(${i}, 1)">❯</button>
                                <button class="nav-btn" style="left:5px;" onclick="changeImg(${i}, -1)">❮</button>
                            ` : ''}
                        </div>
                        <h3>${p.name}</h3>
                        <div class="size-container" id="sizes-${i}">
                            ${szs.map(s => `<button class="size-btn ${s==selectedSizes[i]?'active':''}" onclick="chooseSize(${i},'${s}')">${s}</button>`).join('')}
                        </div>
                        <p style="font-weight:bold; font-size:1.2em; color:var(--main-bg);">${p.price} دج</p>
                        <button style="background:var(--main-bg); color:var(--gold); border:none; padding:15px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="addToCart('${p.name}', ${p.price}, ${i})">إضافة للسلة 🛒</button>
                    </div>`;
            });
        }).catch(() => { document.getElementById("product-container").innerHTML = "خطأ في تحميل المنتجات."; });

        function chooseSize(idx, size) {
            selectedSizes[idx] = size;
            document.getElementById(`sizes-${idx}`).querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.innerText === size));
        }

        function changeImg(idx, dir) {
            const img = document.getElementById(`img-box-${idx}`).querySelector('img');
            let imgs = productImages[idx];
            let currentIdx = imgs.indexOf(img.src);
            if (currentIdx === -1) currentIdx = 0;
            let nextIdx = (currentIdx + dir + imgs.length) % imgs.length;
            img.src = imgs[nextIdx];
        }

        function addToCart(name, price, idx) {
            cart.push({name, price, size: selectedSizes[idx]});
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('floating-cart').style.display = 'block';
            showAlert("✅ تم إضافة المنتج للسلة");
        }

        function renderCartSummary() {
            const c = document.getElementById('cart-items-summary');
            if(cart.length === 0) {
                c.innerHTML = "السلة فارغة حالياً.";
                return;
            }
            c.innerHTML = cart.map((i, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <span><b>${i.name}</b> (${i.size})</span>
                    <span style="color:red; cursor:pointer; font-weight:bold;" onclick="removeFromCart(${idx})">حذف ✕</span>
                </div>
            `).join('');
            updateTotal();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            document.getElementById('cart-count').innerText = cart.length;
            if(cart.length === 0) document.getElementById('floating-cart').style.display = 'none';
            renderCartSummary();
        }

        function updateTotal() {
            const w = document.getElementById("cust-wilaya").value;
            const d = document.getElementById("cust-delivery").value;
            let subtotal = cart.reduce((s, i) => s + parseInt(i.price), 0);
            let shipping = (w && rates[w]) ? (d === 'توصيل للمنزل' ? rates[w][0] : rates[w][1]) : 0;
            document.getElementById("final-price").innerHTML = cart.length ? `السعر الإجمالي: ${subtotal + shipping} دج <br><small>(شحن: ${shipping} دج)</small>` : "";
        }

        async function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const wilaya = document.getElementById('cust-wilaya').value;
            const delType = document.getElementById('cust-delivery').value;
            const address = document.getElementById('address-box').value;

            if (!name || phone.length < 10 || !wilaya || cart.length === 0) {
                alert("يرجى ملء جميع الخانات بشكل صحيح!");
                return;
            }

            const itemsTxt = cart.map(i => `• ${i.name} (${i.size})`).join('%0A');
            const total = document.getElementById('final-price').innerText.split('\n')[0];

            const msg = `🔔 *طلب جديد من الموقع* %0A%0A👤 *الزبون:* ${name} %0A📱 *الهاتف:* ${phone} %0A📍 *الولاية:* ${wilaya} %0A🚚 *النوع:* ${delType} ${address ? '%0A🏠 *العنوان:* '+address : ''} %0A%0A📦 *الطلبية:* %0A${itemsTxt} %0A%0A💰 *${total}*`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`);
                showAlert("✨ تم إرسال طلبك بنجاح! سنتصل بك قريباً.");
                setTimeout(() => { cart = []; location.reload(); }, 3000);
            } catch (e) {
                alert("حدث خطأ في الإرسال، يرجى المحاولة لاحقاً.");
            }
        }
    </script>
</body>
</html>
