<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AM Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-bg: #0A2626; --accent: #F5E6CC; --gold: #D4B483; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--main-bg); color: #fff; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        
        .announcement-bar { background: var(--gold); color: var(--main-bg); padding: 10px 0; font-size: 0.9em; font-weight: bold; position: sticky; top: 0; z-index: 10002; overflow: hidden; }
        .announcement-text { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .header-section { background: var(--accent); color: var(--main-bg); padding: 50px 20px; border-bottom: 2px solid var(--gold); }
        .store-logo { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; transition: 0.3s; cursor: pointer; }
        .header-section h1 { font-size: 2.2em; margin: 15px 0 5px 0; font-weight: 800; }
        .luxury-bio { color: #555; font-style: italic; font-size: 0.95em; max-width: 320px; margin: 0 auto; line-height: 1.4; }

        .page { display: none; padding: 20px; min-height: 60vh; }
        .page.active { display: block; }

        .product-card { background: var(--accent); color: var(--main-bg); padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 400px; border: 2px solid var(--gold); text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .img-container { position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 10px; border: 1px solid var(--gold); background: #fff; }
        .product-img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        
        #img-modal { display: none; position: fixed; z-index: 20000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #img-modal img { max-width: 95%; max-height: 80%; border: 2px solid var(--gold); border-radius: 10px; }
        .close-modal { position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; cursor: pointer; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 10; }

        .size-container { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .size-btn { border: 1px solid var(--main-bg); padding: 8px 15px; border-radius: 5px; background: #fff; cursor: pointer; font-weight: bold; }
        .size-btn.active { background: var(--main-bg); color: var(--gold); }

        .order-now-btn { background: var(--main-bg); color: var(--gold); border: 2px solid var(--gold); padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 10px; transition: 0.3s; }
        .order-now-btn:hover { background: var(--gold); color: var(--main-bg); }

        .cart-section { background: var(--accent); color: var(--main-bg); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 450px; text-align: right; border: 2px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; font-size: 16px; font-family: inherit; }
        
        .confirm-btn { background: var(--main-bg); color: var(--gold); border: 2px solid var(--gold); padding: 15px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1em; margin-top: 10px; }

        footer { background: var(--accent); color: var(--main-bg); padding: 40px 20px; border-top: 4px solid var(--gold); margin-top: 50px; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .footer-badge { background: rgba(10, 38, 38, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--gold); font-weight: bold; font-size: 0.85em; }
        .footer-contact a { display: block; color: var(--main-bg); text-decoration: none; margin: 10px 0; font-weight: 700; font-size: 1.1em; }

        #custom-alert { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--main-bg); padding: 25px; border-radius: 15px; border: 3px solid var(--gold); z-index: 10005; width: 80%; max-width: 300px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="img-modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="">
    </div>

    <div class="announcement-bar"><div class="announcement-text">🚛 توصيل سريع لجميع الولايات | 🤝 الدفع عند الاستلام | ✨ AM Luxury</div></div>

    <div id="shop-page" class="page active">
        <div class="header-section">
            <img src="https://iafevewyaewiujdxipil.supabase.co/storage/v1/object/public/assets/bzam.png" class="store-logo" onclick="goToAdmin()">
            <h1>AM Luxury</h1>
            <p class="luxury-bio">The quintessence of Algerian elegance and sophistication.</p>
        </div>
        <div id="product-container">جاري تحميل المنتجات من القاعدة...</div>
        
        <footer>
            <div class="footer-grid">
                <div class="footer-badge">🤝 الدفع عند الاستلام</div>
                <div class="footer-badge">🚀 توصيل سريع (Noest)</div>
            </div>
            <div class="footer-contact">
                <a href="tel:0776037476">📞 اتصل بنا: 0776037476</a>
                <a href="https://wa.me/213775309572" target="_blank">💬 واتساب: 0775 30 95 72</a>
            </div>
        </footer>
    </div>

    <div id="cart-page" class="page">
        <button onclick="showPage('shop-page')" style="float:right; border:none; background:none; color:var(--gold); font-size:1.2em; cursor:pointer; font-weight:bold;">➡️ العودة</button>
        <h2 style="margin-top:60px; color:var(--gold);">📋 تأكيد الطلبية</h2>
        <section class="cart-section">
            <div id="cart-items-summary" style="background:#fff; padding:15px; border-radius:8px; margin-bottom:15px; color:#333; font-weight:bold;"></div>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
            <select id="cust-wilaya" onchange="updateTotal()"><option value="">اختر الولاية...</option></select>
            <select id="cust-delivery" onchange="toggleAddress()">
                <option value="استلام من المكتب">استلام من المكتب (Noest)</option>
                <option value="توصيل للمنزل">توصيل للمنزل</option>
            </select>
            <input type="text" id="address-box" placeholder="العنوان بالتفصيل" style="display:none;">
            <div id="final-price" style="margin:20px 0; font-weight:bold; font-size:1.3em;"></div>
            <button onclick="sendOrder()" class="confirm-btn">إرسال الطلب الآن 🚀</button>
        </section>
    </div>

    <div id="custom-alert"><p id="alert-msg"></p></div>

    <script>
        const SUPABASE_URL = 'https://itwcwscjuqqagxrnzpwx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0d2N3c2NqdXFxYWd4cm56cHd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTEwMTYsImV4cCI6MjA4ODc2NzAxNn0.VTXn9HijD6DzAULEgVKma-ktbTvjDgiFQT2dqQO6ZgY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const BOT_TOKEN = "8753134519:AAEaqgsaa8kZat3v1pYyNqlfMnZ1JUU0tDM";
        const CHAT_ID = "8332065634";

        // دالة الدخول للأدمن بكود
        function goToAdmin() {
            let pass = prompt("أدخل كود الدخول للأدمن:");
            if(pass === "moh123") {
                window.location.href = "admin.html";
            } else {
                alert("كود خاطئ!");
            }
        }

        const rates = { 
            "01 أدرار": [1500, 1000], "02 الشلف": [750, 450], "03 الأغواط": [1000, 600], "04 أم البواقي": [900, 600], "05 باتنة": [900, 600], "06 بجاية": [800, 500], "07 بسكرة": [1100, 700], "08 بشار": [1200, 800], "09 البليدة": [750, 450], "10 البويرة": [800, 500], "11 تمنراست": [2000, 1500], "12 تبسة": [900, 600], "13 تلمسان": [800, 500], "14 تيارت": [800, 500], "15 تيزي وزو": [800, 500], "16 الجزائر": [700, 450], "17 الجلفة": [1000, 600], "18 جيجل": [900, 600], "19 سطيف": [900, 600], "20 سعيدة": [500, 300], "21 سكيكدة": [900, 600], "22 سيدي بلعباس": [650, 400], "23 عنابة": [900, 600], "24 قالمة": [900, 600], "25 قسنطينة": [900, 600], "26 المدية": [900, 600], "27 مستغانم": [800, 500], "28 المسيلة": [900, 600], "29 معسكر": [600, 400], "30 ورقلة": [1000, 600], "31 وهران": [700, 450], "32 البيض": [1200, 800], "33 إليزي": [1900, 1500], "34 برج بوعريريج": [900, 600], "35 بومرداس": [750, 450], "36 الطارف": [900, 600], "37 تندوف": [1700, 1000], "38 تيسمسيلت": [900, 600], "39 الوادي": [1000, 600], "40 خنشلة": [900, 600], "41 سوق أهراس": [900, 600], "42 تيبازة": [750, 450], "43 ميلة": [900, 600], "44 عين الدفلى": [800, 500], "45 النعامة": [1200, 800], "46 عين تموشنت": [800, 500], "47 غرداية": [1000, 600], "48 غليزان": [700, 450], "49 أولاد جلال": [1100, 700], "50 بني عباس": [1200, 800], "51 إن صالح": [1800, 1200], "52 إن قزام": [2200, 1800], "53 تقرت": [1000, 600], "54 جانت": [2200, 1800], "55 المغير": [1000, 600], "56 المنيعة": [1000, 600], "58 برج باجي مختار": [2000, 1500]
        };

        const wSelect = document.getElementById("cust-wilaya");
        Object.keys(rates).forEach(w => { let o = document.createElement("option"); o.value = w; o.innerHTML = w; wSelect.appendChild(o); });

        let cart = [], productImages = {}, selectedSizes = {};

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openModal(src, e) { e.stopPropagation(); document.getElementById('modal-img').src = src; document.getElementById('img-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('img-modal').style.display = 'none'; }

        async function loadProducts() {
            const container = document.getElementById("product-container");
            const { data: products, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });

            if (error) { container.innerHTML = "خطأ في الاتصال بالقاعدة."; return; }

            container.innerHTML = "";
            products.forEach((p, i) => {
                productImages[i] = [p.image1, p.image2, p.image3, p.image4].filter(img => img);
                selectedSizes[i] = (p.sizes || "S").split(',')[0].trim();
                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container">
                            <img src="${productImages[i][0]}" class="product-img" id="img-tag-${i}" onclick="openModal(this.src, event)">
                            ${productImages[i].length > 1 ? `<button class="nav-btn" style="right:5px;" onclick="changeImg(${i}, 1, event)">❯</button>` : ''}
                        </div>
                        <h3>${p.name}</h3>
                        <div class="size-container">
                            ${(p.sizes || "S,M,L,XL").split(',').map(s => `<button class="size-btn ${s.trim()==selectedSizes[i]?'active':''}" onclick="chooseSize(${i},'${s.trim()}', this)">${s.trim()}</button>`).join('')}
                        </div>
                        <p style="font-weight:bold; font-size:1.3em;">${p.price} دج</p>
                        <button class="order-now-btn" onclick="quickBuy('${p.name}', ${p.price}, ${i})">أطلب الآن 🛍️</button>
                    </div>`;
            });
        }

        loadProducts();

        function chooseSize(idx, size, btn) {
            selectedSizes[idx] = size;
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function changeImg(idx, dir, e) {
            e.stopPropagation();
            const imgElement = document.getElementById(`img-tag-${idx}`);
            let imgs = productImages[idx];
            let currentPath = imgElement.src;
            let currentIndex = imgs.indexOf(currentPath);
            if(currentIndex === -1) currentIndex = 0;
            imgElement.src = imgs[(currentIndex + dir + imgs.length) % imgs.length];
        }

        function quickBuy(name, price, idx) {
            cart = [{name, price, size: selectedSizes[idx]}];
            document.getElementById('cart-items-summary').innerHTML = `المنتج: ${name} | المقاس: ${selectedSizes[idx]}`;
            showPage('cart-page');
            updateTotal();
        }

        function toggleAddress() {
            document.getElementById('address-box').style.display = (document.getElementById('cust-delivery').value === 'توصيل للمنزل') ? 'block' : 'none';
            updateTotal();
        }

        function updateTotal() {
            const w = document.getElementById("cust-wilaya").value;
            const d = document.getElementById("cust-delivery").value;
            let subtotal = cart[0] ? parseInt(cart[0].price) : 0;
            let shipping = (w && rates[w]) ? (d === 'توصيل للمنزل' ? rates[w][0] : rates[w][1]) : 0;
            document.getElementById("final-price").innerHTML = `الإجمالي: ${subtotal + shipping} دج <br> <small>(شحن: ${shipping} دج)</small>`;
        }

        async function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const wilaya = document.getElementById('cust-wilaya').value;
            const delivery = document.getElementById('cust-delivery').value;
            const address = document.getElementById('address-box').value;
            const finalPriceText = document.getElementById('final-price').innerText.split('\n')[0];

            if (!name || phone.length < 10 || !wilaya) { alert("يرجى ملء جميع البيانات!"); return; }

            const { error: dbError } = await supabase.from('orders').insert([{
                customer_name: name,
                phone: phone,
                wilaya: wilaya,
                delivery_type: delivery,
                address: address,
                product_name: cart[0].name + " (" + cart[0].size + ")",
                total_price: finalPriceText
            }]);

            if (dbError) { alert("خطأ في تسجيل الطلب."); return; }

            const msg = `🔔 *طلب جديد من AM Luxury*%0A👤 الاسم: ${name}%0A📱 الهاتف: ${phone}%0A📍 الولاية: ${wilaya}%0A📦 المنتج: ${cart[0].name} (${cart[0].size})%0A🚚 النوع: ${delivery}%0A💰 السعر: ${finalPriceText}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`);
                document.getElementById('alert-msg').innerText = "✅ تم إرسال طلبك بنجاح!";
                document.getElementById('custom-alert').style.display = 'block';
                setTimeout(() => location.reload(), 2000);
            } catch (e) { alert("تم حفظ الطلب ولكن فشل إرسال التنبيه."); }
        }
    </script>
</body>
</html>
