<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AM Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-bg: #0A2626; --accent: #F5E6CC; --gold: #D4B483; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--main-bg); color: #fff; text-align: center; margin: 0; padding: 0; }
        
        .announcement-bar { background: var(--gold); color: var(--main-bg); padding: 10px 0; font-size: 0.9em; font-weight: bold; position: sticky; top: 0; z-index: 10002; overflow: hidden; }
        .announcement-text { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .admin-dots { position: absolute; top: 15px; right: 20px; font-size: 30px; color: var(--main-bg); cursor: pointer; z-index: 10003; opacity: 0.6; }
        .header-section { background: var(--accent); color: var(--main-bg); padding: 40px 20px; border-bottom: 2px solid var(--gold); }
        .store-logo { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; }

        .page { display: none; padding: 20px; min-height: 60vh; }
        .page.active { display: block; }

        .product-card { background: var(--accent); color: var(--main-bg); padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 400px; border: 2px solid var(--gold); text-align: right; }
        .img-container { position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 10px; border: 1px solid var(--gold); }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; }

        .size-container { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 5px; }
        .size-btn { border: 1px solid var(--main-bg); padding: 5px 12px; border-radius: 5px; background: #fff; cursor: pointer; font-weight: bold; }
        .size-btn.active { background: var(--main-bg); color: var(--gold); }

        .cart-section { background: var(--accent); color: var(--main-bg); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 450px; text-align: right; border: 2px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; font-size: 16px; }
        .confirm-btn { background: var(--main-bg); color: var(--gold); border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 8px; font-weight: bold; }

        .admin-table-container { background: white; color: #333; padding: 15px; border-radius: 10px; overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; min-width: 800px; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 0.9em; }
        .status-btn { padding: 5px 8px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.8em; font-weight: bold; }

        #custom-alert { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--main-bg); padding: 25px; border-radius: 15px; border: 3px solid var(--gold); z-index: 10005; width: 80%; }
    </style>
</head>
<body>

    <div class="announcement-bar"><div class="announcement-text">🚛 توصيل سريع (24/48 ساعة) | 🤝 الدفع عند الاستلام | ✨ AM Luxury</div></div>
    <div class="admin-dots" onclick="loginAdmin()">⋮</div>

    <div id="shop-page" class="page active">
        <div class="header-section">
            <img src="https://iafevewyaewiujdxipil.supabase.co/storage/v1/object/public/assets/bzam.png" class="store-logo">
            <h1>AM Luxury</h1>
            <p>الفخامة الجزائرية الأصلية</p>
        </div>
        <div id="product-container">جاري التحميل...</div>
        <button id="floating-cart" onclick="showPage('cart-page')" style="display:none; position:fixed; bottom:20px; left:20px; background:var(--gold); color:var(--main-bg); border:none; padding:15px 25px; border-radius:50px; font-weight:bold; z-index:1000;">🛒 السلة (<span id="cart-count">0</span>)</button>
    </div>

    <div id="cart-page" class="page">
        <button onclick="showPage('shop-page')" style="float:right; border:none; background:none; color:var(--gold); font-size:1.2em; cursor:pointer;">➡️ العودة</button>
        <h2 style="margin-top:40px;">📋 تأكيد الطلبية</h2>
        <section class="cart-section">
            <div id="cart-items-summary" style="background:#fff; padding:10px; border-radius:8px; margin-bottom:15px; color:#333;"></div>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف (10 أرقام)" maxlength="10">
            <select id="cust-wilaya" onchange="updateTotal()"><option value="">اختر الولاية...</option></select>
            <select id="cust-delivery" onchange="toggleAddress()">
                <option value="استلام من المكتب">استلام من المكتب (Noest Express)</option>
                <option value="توصيل للمنزل">توصيل للمنزل</option>
            </select>
            <input type="text" id="address-box" placeholder="العنوان بالتفصيل" style="display:none;">
            <div id="final-price" style="margin:15px 0; font-weight:bold; font-size:1.2em;"></div>
            <button onclick="sendOrder()" class="confirm-btn">إرسال الطلب الآن</button>
        </section>
    </div>

    <div id="admin-page" class="page">
        <button onclick="showPage('shop-page')" style="float:right; background:red; color:white; border:none; padding:10px; border-radius:5px;">خروج</button>
        <h2 style="color:var(--gold);">📦 سجل الطلبات</h2>
        <div class="admin-table-container">
            <table class="admin-table">
                <thead><tr><th>الزبون</th><th>الهاتف</th><th>الولاية</th><th>الطلبية</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                <tbody id="orders-rows"></tbody>
            </table>
        </div>
    </div>

    <div id="custom-alert"><p id="alert-msg" style="font-weight:bold;"></p></div>

    <script>
        const SB_URL = "https://iafevewyaewiujdxipil.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhZmV2ZXd5YWV3aXVqZHhpcGlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQwMTgsImV4cCI6MjA4ODgzMDAxOH0.WjfZHwbG6JkX84AWVMzXAkK-4Fmh24pcl5YGbTVuR4M";
        const BOT_TOKEN = "8753134519:AAEaqgsaa8kZat3v1pYyNqlfMnZ1JUU0tDM";
        const CHAT_ID = "8332065634";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const API_SHEETY = "https://api.sheety.co/f07bc4c4911bc49dacebf60eaa258f01/feuilleDeCalculSansTitre/feuille1";

        // تم استبدال القائمة بالولايات والأسعار التي أرسلتها أنت
        const rates = { 
            "01 أدرار": [1500, 1000], "02 الشلف": [750, 450], "03 الأغواط": [1000, 600], "04 أم البواقي": [900, 600], "05 باتنة": [900, 600], "06 بجاية": [800, 500], "07 بسكرة": [1100, 700], "08 بشار": [1200, 800], "09 البليدة": [750, 450], "10 البويرة": [800, 500], "11 تمنراست": [2000, 1500], "12 تبسة": [900, 600], "13 تلمسان": [800, 500], "14 تيارت": [800, 500], "15 تيزي وزو": [800, 500], "16 الجزائر": [700, 450], "17 الجلفة": [1000, 600], "18 جيجل": [900, 600], "19 سطيف": [900, 600], "20 سعيدة": [500, 300], "21 سكيكدة": [900, 600], "22 سيدي بلعباس": [650, 400], "23 عنابة": [900, 600], "24 قالمة": [900, 600], "25 قسنطينة": [900, 600], "26 المدية": [900, 600], "27 مستغانم": [800, 500], "28 المسيلة": [900, 600], "29 معسكر": [600, 400], "30 ورقلة": [1000, 600], "31 وهران": [700, 450], "32 البيض": [1200, 800], "33 إليزي": [1900, 1500], "34 برج بوعريريج": [900, 600], "35 بومرداس": [750, 450], "36 الطارف": [900, 600], "37 تندوف": [1700, 1000], "38 تيسمسيلت": [900, 600], "39 الوادي": [1000, 600], "40 خنشلة": [900, 600], "41 سوق أهراس": [900, 600], "42 تيبازة": [750, 450], "43 ميلة": [900, 600], "44 عين الدفلى": [800, 500], "45 النعامة": [1200, 800], "46 عين تموشنت": [800, 500], "47 غرداية": [1000, 600], "48 غليزان": [700, 450], "49 أولاد جلال": [1100, 700], "50 بني عباس": [1200, 800], "51 إن صالح": [1800, 1200], "52 إن قزام": [2200, 1800], "53 تقرت": [1000, 600], "54 جانت": [2200, 1800], "55 المغير": [1000, 600], "56 المنيعة": [1000, 600], "58 برج باجي مختار": [2000, 1500]
        };

        const wSelect = document.getElementById("cust-wilaya");
        Object.keys(rates).forEach(w => { let o = document.createElement("option"); o.value = w; o.innerHTML = w; wSelect.appendChild(o); });

        let cart = [], productImages = {}, selectedSizes = {};

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'cart-page') renderCartSummary();
        }

        function toggleAddress() {
            document.getElementById('address-box').style.display = (document.getElementById('cust-delivery').value === 'توصيل للمنزل') ? 'block' : 'none';
            updateTotal();
        }

        function showAlert(msg) {
            const b = document.getElementById('custom-alert');
            document.getElementById('alert-msg').innerText = msg;
            b.style.display = 'block'; setTimeout(() => b.style.display = 'none', 2500);
        }

        fetch(API_SHEETY).then(r => r.json()).then(data => {
            const container = document.getElementById("product-container");
            container.innerHTML = "";
            (data.feuille1 || []).forEach((p, i) => {
                productImages[i] = [p.image1, p.image2, p.image3, p.image4].filter(img => img);
                const szs = (p.sizes || "S,M,L,XL").split(','); selectedSizes[i] = szs[0];
                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container" id="img-box-${i}">
                            <img src="${productImages[i][0]}" class="product-img">
                            ${productImages[i].length > 1 ? `<button class="nav-btn" style="right:5px;" onclick="changeImg(${i}, 1)">❯</button>` : ''}
                        </div>
                        <h3>${p.name}</h3>
                        <div class="size-container" id="sizes-${i}">
                            ${szs.map(s => `<button class="size-btn ${s==selectedSizes[i]?'active':''}" onclick="chooseSize(${i},'${s}')">${s}</button>`).join('')}
                        </div>
                        <p style="font-weight:bold;">${p.price} دج</p>
                        <button style="background:var(--gold); border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer;" onclick="addToCart('${p.name}', ${p.price}, ${i})">إضافة للسلة 🛒</button>
                    </div>`;
            });
        });

        function chooseSize(idx, size) {
            selectedSizes[idx] = size;
            document.getElementById(`sizes-${idx}`).querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.innerText === size));
        }

        function changeImg(idx, dir) {
            const img = document.getElementById(`img-box-${idx}`).querySelector('img');
            let imgs = productImages[idx]; img.src = imgs[(imgs.indexOf(img.src) + dir + imgs.length) % imgs.length];
        }

        function addToCart(name, price, idx) {
            cart.push({name, price, size: selectedSizes[idx]});
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('floating-cart').style.display = 'block';
            showAlert("✅ أضيف للسلة");
        }

        function renderCartSummary() {
            const c = document.getElementById('cart-items-summary');
            c.innerHTML = cart.length ? cart.map((i, idx) => `<div>${i.name} (${i.size}) <span onclick="cart.splice(${idx},1);renderCartSummary();" style="color:red; cursor:pointer;">✕</span></div>`).join('') : "السلة فارغة";
            updateTotal();
        }

        function updateTotal() {
            const w = document.getElementById("cust-wilaya").value, d = document.getElementById("cust-delivery").value;
            let sub = cart.reduce((s, i) => s + parseInt(i.price), 0);
            let ship = (w && rates[w]) ? (d === 'توصيل للمنزل' ? rates[w][0] : rates[w][1]) : 0;
            document.getElementById("final-price").innerHTML = cart.length ? `الإجمالي: ${sub + ship} دج` : "";
        }

        async function sendOrder() {
            const name = document.getElementById('cust-name').value, phone = document.getElementById('cust-phone').value, wilaya = document.getElementById('cust-wilaya').value;
            if (!name || phone.length < 10 || !wilaya || cart.length === 0) return alert("أكمل البيانات!");
            const itemsTxt = cart.map(i => `${i.name} (${i.size})`).join(', ');

            await supabaseClient.from('orders').insert([{ customer_name: name, phone, wilaya, items: itemsTxt, status: 'جديد' }]);
            
            const msg = `🛍 طلب جديد: ${name}\n📱 هاتف: ${phone}\n📍 ولاية: ${wilaya}\n📦 طلب: ${itemsTxt}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
            
            showAlert("✨ تم الطلب بنجاح!"); setTimeout(() => location.reload(), 2000);
        }

        function loginAdmin() { if (prompt("كود الإدارة:") === "2026") { showPage('admin-page'); loadOrders(); } }

        async function updateStatus(id, newStatus) {
            const { error } = await supabaseClient.from('orders').update({ status: newStatus }).eq('id', id);
            if (!error) { showAlert("✅ تم التحديث"); loadOrders(); }
        }

        async function loadOrders() {
            const rows = document.getElementById('orders-rows'); rows.innerHTML = "<tr><td colspan='6'>جاري التحميل...</td></tr>";
            const { data } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });

            if (data) {
                rows.innerHTML = data.map(o => `
                    <tr>
                        <td>${o.customer_name}</td>
                        <td>${o.phone}</td>
                        <td>${o.wilaya}</td>
                        <td>${o.items}</td>
                        <td>
                            <select class="status-btn" onchange="updateStatus(${o.id}, this.value)" style="background:${o.status==='تم التأكيد'?'#d4edda':o.status==='جديد'?'#fff3cd':'#f8d7da'}">
                                <option value="جديد" ${o.status==='جديد'?'selected':''}>جديد 🆕</option>
                                <option value="تم التأكيد" ${o.status==='تم التأكيد'?'selected':''}>مؤكد ✅</option>
                                <option value="تم الإرسال" ${o.status==='تم الإرسال'?'selected':''}>مرسل 🚚</option>
                            </select>
                        </td>
                        <td>${new Date(o.created_at).toLocaleDateString('ar-DZ')}</td>
                    </tr>
                `).join('');
            }
        }
    </script>
</body>
</html>
