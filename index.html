<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AM Luxury</title>
    <style>
        body { font-family: sans-serif; background-color: #0A2626; color: #fff; text-align: center; padding: 20px; }
        .header-section { background: #F5E6CC; color: #0A2626; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #D4B483; }
        .store-logo { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 3px solid #D4B483; margin-bottom: 10px; }
        .store-name { font-size: 2.5em; font-weight: bold; margin: 10px 0 5px 0; color: #0A2626; }
        .slogan { font-size: 1.2em; font-style: italic; color: #555; margin-bottom: 20px; }
        .product-card { background: #F5E6CC; color: #0A2626; padding: 15px; border-radius: 15px; margin: 15px auto; max-width: 300px; border: 2px solid #D4B483; }
        .slider-container { position: relative; width: 100%; margin-bottom: 10px; }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; border: 2px solid #D4B483; }
        .nav-btn { background: rgba(0,0,0,0.5); color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; margin: 0 5px; }
        .cart-section { background: #F5E6CC; color: #0A2626; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: right; }
        input, select { width: 90%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #D4B483; }
        .add-btn { background: #D4B483; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        /* Footer Style */
        .footer-social { margin-top: 40px; padding: 20px; border-top: 1px solid #D4B483; color: #D4B483; }
        .footer-social a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://iafevewyaewiujdxipil.supabase.co/storage/v1/object/public/assets/bzam.png" alt="AM Luxury Logo" class="store-logo">
        <h1 class="store-name">AM Luxury</h1>
        <p class="slogan">Classic and Casual for Your Style</p>
    </div>

    <div id="product-container"></div>

    <section class="cart-section">
        <h2 style="text-align: center;">🛒 سلة التسوق</h2>
        <div id="cart-items"></div>
        <hr>
        <input type="text" id="cust-name" placeholder="الاسم الكامل" required>
        <input type="tel" id="cust-phone" placeholder="رقم الهاتف (10 أرقام)" pattern="0[5-7][0-9]{8}" maxlength="10" title="يرجى إدخال 10 أرقام تبدأ بـ 05 أو 06 أو 07" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <select id="cust-wilaya" onchange="renderCart()"><option value="">اختر الولاية...</option></select>
        <select id="cust-delivery" onchange="renderCart(); document.getElementById('address-box').style.display=(this.value=='توصيل للمنزل'?'block':'none')">
            <option value="استلام من المكتب">استلام من المكتب</option>
            <option value="توصيل للمنزل">توصيل للمنزل</option>
        </select>
        <input type="text" id="address-box" placeholder="العنوان بالتفصيل" style="display:none;">
        <button onclick="sendOrder()" class="add-btn" style="background:#0A2626; color:#D4B483;">إتمام الطلب</button>
    </section>

    <div class="footer-social">
        <p>تابعونا على:</p>
        <a href="https://www.facebook.com/profile.php?id=61587041911934" target="_blank">فيسبوك</a> |
        <a href="https://www.tiktok.com/@am.luxury20?_r=1&_t=ZS-94j6ZOS7wST" target="_blank">تيك توك</a> |
        <a href="https://www.instagram.com/am_luxury.20?igsh=eDk3NnNpanUwOXI4" target="_blank">إنستغرام</a>
    </div>

    <script>
        const API_SHEETY = "https://api.sheety.co/52fd183a674270cd4b36a72f4307bb93/feuilleDeCalculSansTitre/feuille1";
        const BOT_TOKEN = "8753134519:AAEaqgsaa8kZat3v1pYyNqlfMnZ1JUU0tDM";
        const CHAT_ID = "8332065634";
        let cart = [];

        const rates = { "01 أدرار": [1500, 1000], "02 الشلف": [750, 450], "03 الأغواط": [1000, 600], "04 أم البواقي": [900, 600], "05 باتنة": [900, 600], "06 بجاية": [800, 500], "07 بسكرة": [1100, 700], "08 بشار": [1200, 800], "09 البليدة": [750, 450], "10 البويرة": [800, 500], "11 تمنراست": [2000, 1500], "12 تبسة": [900, 600], "13 تلمسان": [800, 500], "14 تيارت": [800, 500], "15 تيزي وزو": [800, 500], "16 الجزائر": [700, 450], "17 الجلفة": [1000, 600], "18 جيجل": [900, 600], "19 سطيف": [900, 600], "20 سعيدة": [500, 300], "21 سكيكدة": [900, 600], "22 سيدي بلعباس": [650, 400], "23 عنابة": [900, 600], "24 قالمة": [900, 600], "25 قسنطينة": [900, 600], "26 المدية": [900, 600], "27 مستغانم": [800, 500], "28 المسيلة": [900, 600], "29 معسكر": [600, 400], "30 ورقلة": [1000, 600], "31 وهران": [700, 450], "32 البيض": [1200, 800], "33 إليزي": [1900, 1500], "34 برج بوعريريج": [900, 600], "35 بومرداس": [750, 450], "36 الطارف": [900, 600], "37 تندوف": [1700, 1000], "38 تيسمسيلت": [900, 600], "39 الوادي": [1000, 600], "40 خنشلة": [900, 600], "41 سوق أهراس": [900, 600], "42 تيبازة": [750, 450], "43 ميلة": [900, 600], "44 عين الدفلى": [800, 500], "45 النعامة": [1200, 800], "46 عين تموشنت": [800, 500], "47 غرداية": [1000, 600], "48 غليزان": [700, 450], "49 أولاد جلال": [1100, 700], "50 بني عباس": [1200, 800], "51 إن صالح": [1800, 1200], "52 إن قزام": [2200, 1800], "53 تقرت": [1000, 600], "54 جانت": [2200, 1800], "55 المغير": [1000, 600], "56 المنيعة": [1000, 600], "58 برج باجي مختار": [2000, 1500] };

        const wSelect = document.getElementById("cust-wilaya");
        Object.keys(rates).forEach(w => { let o = document.createElement("option"); o.value = w; o.innerHTML = w; wSelect.appendChild(o); });

        function showNotification(msg) {
            const div = document.createElement("div");
            div.style.cssText = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#D4B483; color:#0A2626; padding:15px; border-radius:10px; z-index:9999; font-weight:bold; box-shadow:0 0 10px rgba(0,0,0,0.5);";
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        fetch(API_SHEETY).then(r => r.json()).then(data => {
            const container = document.getElementById("product-container");
            const allSizes = ['S', 'M', 'L', 'XL', 'XXL'];
            data.feuille1.forEach((p, i) => {
                const imgs = [p.image1, p.image2, p.image3, p.image4, p.image5].filter(img => img);
                const available = p.sizes ? p.sizes.split(',').map(s => s.trim()) : allSizes;
                container.innerHTML += `<div class="product-card"><h3>${p.name}</h3>
                    <div class="slider-container"><a href="${imgs[0]}" target="_blank"><img id="img-${i}" src="${imgs[0]}" data-imgs='${JSON.stringify(imgs)}' data-curr="0" class="product-img"></a>
                    <div style="margin-top:10px;"><button class="nav-btn" onclick="changeImg(${i}, -1)">❮</button> <button class="nav-btn" onclick="changeImg(${i}, 1)">❯</button></div></div>
                    <p>السعر: ${p.price} دج</p>
                    <div style="margin:10px 0;">${allSizes.map(s => {
                        const isAvailable = available.includes(s);
                        return isAvailable ? `<button onclick="document.getElementById('size-${i}').value='${s}'; this.parentElement.querySelectorAll('.btn-s').forEach(b=>b.style.background='#D4B483'); this.style.background='#0A2626'; this.style.color='#D4B483';" class="btn-s" style="margin:2px; border:none; padding:5px 10px; cursor:pointer; background:#D4B483; border-radius:5px; color:#0A2626;">${s}</button>`
                        : `<button disabled style="margin:2px; border:none; padding:5px 10px; background:#ccc; border-radius:5px; text-decoration:line-through; color:#666;">${s}</button>`;
                    }).join('')}
                    <input type="hidden" id="size-${i}" value="${available[0] || 'S'}"></div>
                    <button class="add-btn" onclick="addToCart('${p.name}', ${p.price}, 'size-${i}')">إضافة للسلة</button></div>`;
            });
        });

        function changeImg(i, dir) {
            const img = document.getElementById(`img-${i}`);
            const list = JSON.parse(img.dataset.imgs);
            let cur = (parseInt(img.dataset.curr) + dir + list.length) % list.length;
            img.src = list[cur]; img.dataset.curr = cur;
            img.parentElement.href = list[cur];
        }

        function addToCart(name, price, sId) {
            cart.push({name, price, size: document.getElementById(sId).value});
            renderCart();
            showNotification("تمت الإضافة للسلة!");
        }

        function renderCart() {
            const w = document.getElementById("cust-wilaya").value;
            const d = document.getElementById("cust-delivery").value;
            let sub = cart.reduce((s, i) => s + parseInt(i.price), 0);
            let ship = (w && rates[w]) ? (d == 'توصيل للمنزل' ? rates[w][0] : rates[w][1]) : 0;
            document.getElementById("cart-items").innerHTML = cart.map((i, index) => 
                `<div style="display:flex; justify-content:space-between; align-items:center; margin:5px 0; background:rgba(255,255,255,0.1); padding:5px; border-radius:5px;">
                    <span>${i.name} (${i.size}) - ${i.price} دج</span>
                    <button onclick="removeFromCart(${index})" style="background:#cc0000; color:white; border:none; border-radius:3px; padding:2px 8px; cursor:pointer;">X</button>
                </div>`).join('') + (cart.length > 0 ? `<hr><strong>المجموع الفرعي: ${sub} دج</strong><br><strong>سعر التوصيل: ${ship} دج</strong><br><strong style="font-size:1.2em; color:#D4B483;">المجموع الكلي: ${sub + ship} دج</strong>` : '');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function sendOrder() {
            const n = document.getElementById("cust-name").value;
            const p = document.getElementById("cust-phone").value;
            const w = document.getElementById("cust-wilaya").value;
            const d = document.getElementById("cust-delivery").value;
            const addr = document.getElementById("address-box").value;
            const phoneRegex = /^0[5-7][0-9]{8}$/;
            if(!n || !p || !w || cart.length == 0) return showNotification("يرجى إكمال البيانات!");
            if(!phoneRegex.test(p)) return showNotification("يرجى إدخال رقم هاتف جزائري صحيح (10 أرقام)!");
            let sub = cart.reduce((s, i) => s + parseInt(i.price), 0);
            let ship = rates[w] ? (d == 'توصيل للمنزل' ? rates[w][0] : rates[w][1]) : 0;
            const msg = `🛍 *طلب جديد من AM Luxury*%0A%0A👤 *الاسم:* ${n}%0A📱 *الهاتف:* ${p}%0A📍 *الولاية:* ${w}%0A🚚 *التوصيل:* ${d}%0A` + (addr ? `🏡 *العنوان:* ${addr}%0A` : ``) + `%0A💰 *المجموع:* ${sub + ship} دج`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`).then(() => {
                showNotification("شكراً لثقتكم!");
                cart = []; renderCart();
                document.getElementById("cust-name").value = "";
                document.getElementById("cust-phone").value = "";
                document.getElementById("address-box").value = "";
            });
        }
   </script>
</body>
</html>
