<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AM Luxury Store</title>
    <style>
        body { font-family: sans-serif; background: #0A2626; color: #fff; text-align: center; padding: 10px; }
        .product-card { background: #F5E6CC; color: #0A2626; padding: 15px; border-radius: 15px; margin: 10px auto; max-width: 350px; }
        .product-img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        .controls { display: flex; justify-content: space-between; margin: 10px 0; }
        button { cursor: pointer; padding: 8px; border-radius: 5px; border: none; background: #D4B483; }
        input, select { width: 95%; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .cart-item { display: flex; justify-content: space-between; background: #eee; padding: 5px; margin: 5px 0; border-radius: 5px; color: #000; }
    </style>
</head>
<body>

    <h1>AM Luxury</h1>
    <div id="product-container"></div>

    <div class="product-card" style="background: #fff; color: #000;">
        <h2>🛒 سلة التسوق</h2>
        <div id="cart-items"></div>
        <h3 id="total-price">المجموع: 0 دج</h3>
        <input type="text" id="cust-name" placeholder="الاسم الكامل">
        <input type="text" id="cust-phone" placeholder="رقم الهاتف">
        <select id="cust-wilaya"></select>
        <select id="delivery-type">
            <option value="منزل">توصيل للمنزل</option>
            <option value="مكتب">توصيل للمكتب</option>
        </select>
        <button onclick="sendOrder()" style="width:100%; background:green; color:white; font-size:1.2em;">تأكيد الطلب</button>
    </div>

    <script>
        const wilayas = ["ادرار", "الشلف", "الاغواط", "ام البواقي", "باتنة", "بجاية", "بسكرة", "بشار", "البليدة", "البويرة", "تمنراست", "تبسة", "تلمسان", "تيارت", "تيزي وزو", "الجزائر", "الجلفة", "جيجل", "سطيف", "سعيدة", "سكيكدة", "سيدي بلعباس", "عنابة", "قالمة", "قسنطينة", "المدية", "مستغانم", "المسيلة", "معسكر", "ورقلة", "وهران", "البيض", "اليزي", "برج بوعريريج", "بومرداس", "الطارف", "تندوف", "تيسمسيلت", "الوادي", "خنشلة", "سوق اهراس", "تيبازة", "ميلة", "عين الدفلى", "النعامة", "عين تموشنت", "غرداية", "غليزان"];
        const select = document.getElementById("cust-wilaya");
        wilayas.forEach(w => select.innerHTML += `<option value="${w}">${w}</option>`);

        let cart = [];
        // مثال لمنتج (يمكنك جلب البيانات من API)
        const product = { name: "Polo Ralph Lauren", price: 5900, imgs: ["img1.jpg", "img2.jpg"], curr: 0 };

        function renderProduct() {
            document.getElementById("product-container").innerHTML = `
                <div class="product-card">
                    <h3>${product.name}</h3>
                    <img id="main-img" src="${product.imgs[product.curr]}" class="product-img">
                    <div class="controls">
                        <button onclick="changeImg(-1)">السابق</button>
                        <button onclick="changeImg(1)">التالي</button>
                    </div>
                    <select id="size-select"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                    <p>السعر: ${product.price} دج</p>
                    <button onclick="addToCart()">إضافة للسلة</button>
                </div>`;
        }

        function changeImg(dir) {
            product.curr = (product.curr + dir + product.imgs.length) % product.imgs.length;
            renderProduct();
        }

        function addToCart() {
            const size = document.getElementById("size-select").value;
            cart.push({...product, size});
            alert("تمت الإضافة للسلة!");
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById("cart-items");
            let total = 0;
            container.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `<div class="cart-item">${item.name} (${item.size}) - ${item.price} دج <button onclick="cart.splice(${i},1); renderCart()">❌</button></div>`;
            }).join('');
            document.getElementById("total-price").innerText = "المجموع: " + total + " دج";
        }

        function sendOrder() {
            if(cart.length === 0) return alert("السلة فارغة!");
            alert("شكراً لثقتك بنا! سنتصل بك قريباً لتأكيد طلبك.");
            cart = []; renderCart();
        }

        renderProduct();
    </script>
</body>
</html>
